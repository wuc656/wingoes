name: CI
on:
  push:
    branches: [ "main", "bindgen", "ci", "com_objects_v3" ]
  pull_request:

concurrency:
  # For PRs, later CI runs preempt previous ones. e.g. a force push on a PR
  # cancels running CI jobs and starts all new ones.
  #
  # For non-PR pushes, concurrency.group needs to be unique for every distinct
  # CI run we want to have happen. Use run_id, which in practice means all
  # non-PR CI runs will be allowed to run without preempting each other.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  # ↑ 修正 typo: "$${{" → "${{", 以及 "github.pull_request" → "github.event.pull_request"
  cancel-in-progress: true

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        goarch: [ "386", "amd64", "arm64" ]
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
        # ↑ 新增: 啟用內建 Go module 快取，加速後續 CI runs

    - name: Install go-winres
      run: go install github.com/tc-hib/go-winres@latest

    - name: Set up build directory
      run: mkdir -p .\bin

    - name: Build Binaries
      run: go build -v -o ./bin ./...
      env:
        GOARCH: ${{ matrix.goarch }}

    - name: Build Test Binaries
      run: go test -c -o ./bin ./...
      # ↑ 注意: 若專案有多個 package，各自會產生對應的 .test.exe
      env:
        GOARCH: ${{ matrix.goarch }}

    - name: Bind Resources to All Binaries
      run: |
        foreach ($file in Get-ChildItem .\bin\*.exe) {
          go-winres patch $file
        }

    - name: Test
      if: ${{ matrix.goarch != 'arm64' }}
      run: go test -v ./...
      # ↑ 修正: 移除錯誤的 "-o ./bin"（多 package 時不支援）
      #   直接執行測試，不重新輸出二進位；若需執行已編譯的 .test.exe
      #   可改用: Get-ChildItem .\bin\*.test.exe | % { & $_ -test.v }
      env:
        GOARCH: ${{ matrix.goarch }}
